<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Shop{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-indigo-600">Shop</a>
      <div class="flex gap-4 text-sm">
        <a href="/" class="text-gray-600 hover:text-indigo-600">Articles</a>
        <a href="/cart" class="text-gray-600 hover:text-indigo-600">Cart</a>
        <a href="/admin/articles" class="text-gray-500 hover:text-indigo-600">Admin</a>
      </div>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>
