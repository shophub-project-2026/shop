{{template "layout.html" .}}
{{define "title"}}{{if .Article.ID.String | ne "00000000-0000-0000-0000-000000000000"}}Edit{{else}}New{{end}} Article{{end}}
{{define "content"}}
<div class="max-w-md">
  <a href="/admin/articles" class="text-sm text-indigo-600 hover:underline mb-4 inline-block">← Back to articles</a>
  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    {{if .IsEdit}}Edit article{{else}}New article{{end}}
  </h1>

  {{if .Error}}
  <div class="mb-4 p-3 rounded bg-red-50 text-red-700 text-sm border border-red-200">{{.Error}}</div>
  {{end}}

  <form method="POST" action="{{if .IsEdit}}/admin/articles/{{.Article.ID}}/edit{{else}}/admin/articles/new{{end}}"
        class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 flex flex-col gap-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" value="{{.Article.Name}}" required
             class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Price (USD)</label>
      <input type="number" name="price" value="{{if .Article.Price}}{{printf "%.2f" .Article.Price}}{{end}}"
             step="0.01" min="0.01" required
             class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
      <input type="number" name="quantity" value="{{.Article.Quantity}}" min="0" required
             class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <button type="submit"
            class="bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700 font-medium text-sm">
      {{if .IsEdit}}Save changes{{else}}Create article{{end}}
    </button>
  </form>
</div>
{{end}}
